{% extends 'base.html' %}

{% block title %}Registro | SafeCity{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}

<div class="auth-bg">

    <div class="auth-card">

        <div class="brand">

            <img
                src="{{ url_for('static', filename='img/logo_safecity.png') }}"
                alt="SafeCity"
                class="brand-logo">

            <span class="brand-text">
                SafeCity
            </span>

        </div>

        <div class="auth-h">Crear cuenta</div>

        <div class="auth-sub">
            Completa tus datos para registrarte en la plataforma
        </div>

        <form method="POST">

            <div class="field">
                <label>Nombre</label>

                <input type="text"
                       name="nombre"
                       placeholder="Ingresa tu nombre"
                       required>
            </div>

            <div class="field">
                <label>Apellido</label>

                <input type="text"
                       name="apellido"
                       placeholder="Ingresa tu apellido"
                       required>
            </div>

            <div class="field">
                <label>Usuario</label>

                <input type="text"
                       name="username"
                       placeholder="Elige un nombre de usuario"
                       required>
            </div>

            <div class="field">
                <label>Correo electrónico</label>

                <input type="email"
                       name="email"
                       placeholder="tu@correo.com"
                       required>
            </div>

            <div class="field">
                <label>Contraseña</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required>

                    <button
                        type="button"
                        class="toggle-password"
                        onclick="togglePassword('password', this)">

                        <i class="ti ti-eye"></i>

                    </button>

                </div>
            </div>

            <div class="field">
                <label>Verificar contraseña</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="Repite tu contraseña"
                        required>

                    <button
                        type="button"
                        class="toggle-password"
                        onclick="togglePassword('confirm_password', this)">

                        <i class="ti ti-eye"></i>

                    </button>

                </div>
            </div>

            <button type="submit" class="btn-auth">
                Registrarse
            </button>

        </form>

        <div class="auth-foot">
            ¿Ya tienes cuenta?

            <a class="auth-link"
               href="{{ url_for('auth.login') }}">
                Iniciar sesión
            </a>
        </div>

    </div>

</div>

<script>
function togglePassword(inputId, button) {

    const input = document.getElementById(inputId);
    const icon = button.querySelector("i");

    if (input.type === "password") {

        input.type = "text";
        icon.className = "ti ti-eye-off";

    } else {

        input.type = "password";
        icon.className = "ti ti-eye";
    }
}
</script>

{% endblock %}
