{% extends "base.html" %}

{% block title %}Nuevo Usuario | SafeCity{% endblock %}

{% block content %}

<div class="admin-page">

    <div class="admin-header">

        <div>

            <h1 class="admin-title">

                <i class="ti ti-user-plus me-2"></i>

                Nuevo Usuario

            </h1>

            <p class="text-secondary mb-0">

                Registra un nuevo usuario en la plataforma.

            </p>

        </div>

    </div>

    <div class="admin-card form-card-admin">

        <form method="POST">

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Nombre
                </label>

                <input
                    type="text"
                    class="form-control admin-input"
                    name="nombre"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Apellido
                </label>

                <input
                    type="text"
                    class="form-control admin-input"
                    name="apellido"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Nombre de usuario
                </label>

                <input
                    type="text"
                    class="form-control admin-input"
                    name="username"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Correo electrónico
                </label>

                <input
                    type="email"
                    class="form-control admin-input"
                    name="email"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Contraseña
                </label>

                <input
                    type="password"
                    class="form-control admin-input"
                    name="password"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Rol
                </label>

                <select
                    class="form-select admin-input"
                    name="id_rol">

                    {% for rol in roles %}

                    <option value="{{ rol.id_rol }}">

                        {{ rol.nombre }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="d-flex align-items-center gap-3">

                <a href="{{ url_for('usuarios.listar') }}"
                   class="btn btn-light rounded-pill px-4">

                    Cancelar

                </a>

                <button
                    type="submit"
                    class="admin-btn">

                    <i class="ti ti-device-floppy me-1"></i>

                    Guardar

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
