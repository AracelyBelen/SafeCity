{% extends "base.html" %}

{% block title %}Editar Zona | SafeCity{% endblock %}

{% block content %}

<div class="admin-page">

    <div class="admin-header">

        <div>

            <h1 class="admin-title">

                <i class="ti ti-edit me-2"></i>

                Editar Zona

            </h1>

            <p class="text-secondary mb-0">

                Actualiza la información de la zona seleccionada.

            </p>

        </div>

    </div>

    <div class="admin-card form-card-admin">

        <form method="POST">

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Nombre de la zona
                </label>

                <input
                    type="text"
                    class="form-control admin-input"
                    name="nombre_zona"
                    value="{{ zona.nombre_zona }}"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Distrito
                </label>

                <input
                    type="text"
                    class="form-control admin-input"
                    name="distrito"
                    value="{{ zona.distrito }}"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Descripción
                </label>

                <textarea
                    class="form-control admin-input"
                    name="descripcion"
                    rows="4"
                    required>{{ zona.descripcion }}</textarea>

            </div>

            <div class="d-flex align-items-center gap-3">

                <a href="{{ url_for('zonas.listar') }}"
                   class="btn btn-light rounded-pill px-4">

                    Cancelar

                </a>

                <button
                    type="submit"
                    class="admin-btn">

                    <i class="ti ti-check me-1"></i>

                    Actualizar

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
