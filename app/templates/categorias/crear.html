{% extends "base.html" %}

{% block title %}Nueva Categoría | SafeCity{% endblock %}

{% block content %}

<div class="admin-page">

    <div class="admin-header">

        <div>

            <h1 class="admin-title">

                <i class="ti ti-category-plus me-2"></i>

                Nueva Categoría

            </h1>

            <p class="text-secondary mb-0">

                Crea una nueva categoría para clasificar los reportes.

            </p>

        </div>

    </div>

    <div class="admin-card form-card-admin">

        <form method="POST">

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Nombre de la categoría
                </label>

                <input
                    type="text"
                    class="form-control admin-input"
                    name="nombre"
                    placeholder="Ejemplo: Robo"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Descripción
                </label>

                <textarea
                    class="form-control admin-input"
                    name="descripcion"
                    rows="4"
                    placeholder="Describe la categoría..."
                    required></textarea>

            </div>

            <div class="d-flex align-items-center gap-3">

                <a href="{{ url_for('categorias.listar') }}"
                   class="btn btn-light rounded-pill px-4">

                    Cancelar

                </a>

                <button
                    type="submit"
                    class="admin-btn">

                    <i class="ti ti-device-floppy me-1"></i>

                    Guardar

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
